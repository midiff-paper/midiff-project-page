<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Mi — MiDiff (ISMIR supplementary)">
  <defs>
    <!-- Restrained palette suitable for proceedings / supplementary pages -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="miFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="miShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="96" height="96" rx="20" fill="url(#cardBg)"/>

  <!-- Very subtle top highlight -->
  <path d="M16 14c15-5 49-5 64 0 3 1 4 4 1 6l-.7 1c-19-6-44-6-56.6 0-2-1.6-1.7-4.6 1.4-6z" fill="#ffffff" opacity="0.06"/>

  <rect x="2.5" y="2.5" width="91" height="91" rx="18.5" fill="none" stroke="url(#cardRim)" stroke-width="2" opacity="0.92"/>

  <g filter="url(#miShadow)">
    <g transform="translate(48, 48)">
      <text
        x="0"
        y="0"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="58"
        letter-spacing="-0.05em"
        fill="url(#miFill)">Mi</text>
    </g>
  </g>
</svg>
