<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="MiDiff">
  <defs>
    <linearGradient id="mdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <radialGradient id="mdGlow" cx="22%" cy="15%" r="62%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#c084fc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mdBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="mdLetter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="35%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="mdWave" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="mdDrop" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.65" flood-color="#020617" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="32" height="32" rx="9" fill="#020617"/>
  <rect width="32" height="32" rx="9" fill="url(#mdBg)"/>
  <rect width="32" height="32" rx="9" fill="url(#mdGlow)"/>

  <!-- Top sheen -->
  <path d="M7 7.5c4.2-1.6 13.8-1.6 18 0 .8.3 1 1 .4 1.5l-.2.3c-5.5-1.8-12.5-1.8-18.2 0-.6-.5-.5-1.3.4-1.6z" fill="#ffffff" opacity="0.14"/>

  <!-- Neon rim -->
  <rect x="1.2" y="1.2" width="29.6" height="29.6" rx="8" fill="none" stroke="url(#mdBorder)" stroke-width="1.15" opacity="0.92"/>

  <!-- M logomark -->
  <g filter="url(#mdDrop)">
    <path fill="url(#mdLetter)" d="M8.4 23.4V9.6h2.9l4.1 10.6 4.1-10.6h2.9v13.8h-2.3V12.8l-4.4 10.6h-1.6L10.7 12.8v10.6z"/>
  </g>

  <!-- Diffusion wave accent -->
  <path d="M6.8 26.9c1.6-.9 2.4-3.4 4.2-3.4s2.3 2.8 4 2.8 2.2-3 4-3 2.4 3.4 4.2 3.4 2.5-2.8 4.3-2.8 2.2 2.8 4 2.8 2.5-3.6 4.5-3.3"
        fill="none" stroke="url(#mdWave)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Spark highlights -->
  <circle cx="24.8" cy="8.2" r="0.85" fill="#fef08a"/>
  <circle cx="26.9" cy="10.6" r="0.45" fill="#e0f2fe" opacity="0.9"/>
</svg>
