<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="MiDiff">
  <defs>
    <linearGradient id="mdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <radialGradient id="mdGlow" cx="22%" cy="12%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#c084fc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mdBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="mdLetter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="headL" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="headR" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <radialGradient id="headShineL" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headShineR" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="mdDrop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.65"/>
    </filter>
    <filter id="notesCast" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="96" height="96" rx="22" fill="#020617"/>
  <rect width="96" height="96" rx="22" fill="url(#mdBg)"/>
  <rect width="96" height="96" rx="22" fill="url(#mdGlow)"/>

  <path d="M18 18c14-5 46-5 60 0 3 1 4 4 1 6l-.8 1.2c-18-6-42-6-54.8 0-2.2-1.8-1.8-4.8 1.4-6z" fill="#ffffff" opacity="0.11"/>

  <rect x="3" y="3" width="90" height="90" rx="19" fill="none" stroke="url(#mdBorder)" stroke-width="2" opacity="0.9"/>

  <!-- Wordmark (room below for beam + staff; avoids overlap with descenders of “f”) -->
  <g filter="url(#mdDrop)">
    <text
      x="48" y="28"
      text-anchor="middle"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-weight="800"
      font-size="17"
      letter-spacing="-0.02em"
      fill="url(#mdLetter)">MiDiff</text>
  </g>

  <!-- Five-line staff -->
  <g opacity="0.52" stroke="#e2e8f0" stroke-width="1.15" stroke-linecap="round">
    <line x1="10" y1="54" x2="86" y2="54"/>
    <line x1="10" y1="58.25" x2="86" y2="58.25"/>
    <line x1="10" y1="62.5" x2="86" y2="62.5"/>
    <line x1="10" y1="66.75" x2="86" y2="66.75"/>
    <line x1="10" y1="71" x2="86" y2="71"/>
  </g>

  <!-- Primary beamed eighth notes: filled beam + bold stems + large heads -->
  <g filter="url(#notesCast)">
    <path d="M 26 43 L 66 39 L 66 46 L 26 50 Z" fill="url(#beamGrad)" opacity="0.98"/>

    <line x1="35" y1="46.5" x2="35" y2="72" stroke="#f8fafc" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="54" y1="44.5" x2="54" y2="70" stroke="#f8fafc" stroke-width="3.2" stroke-linecap="round"/>

    <g transform="rotate(-24 35 76)">
      <ellipse cx="35" cy="76" rx="9.5" ry="7" fill="url(#headL)"/>
      <ellipse cx="33.5" cy="74.3" rx="4" ry="2.5" fill="url(#headShineL)" opacity="0.88"/>
    </g>
    <g transform="rotate(-24 54 74)">
      <ellipse cx="54" cy="74" rx="9.5" ry="7" fill="url(#headR)"/>
      <ellipse cx="52.5" cy="72.4" rx="4" ry="2.5" fill="url(#headShineR)" opacity="0.78"/>
    </g>
    <g transform="rotate(-24 35 76)">
      <ellipse cx="35" cy="76" rx="9.5" ry="7" fill="none" stroke="#0f172a" stroke-opacity="0.4" stroke-width="0.85"/>
    </g>
    <g transform="rotate(-24 54 74)">
      <ellipse cx="54" cy="74" rx="9.5" ry="7" fill="none" stroke="#0f172a" stroke-opacity="0.4" stroke-width="0.85"/>
    </g>

    <!-- Secondary beamed pair (sixteenth-ish flourish) — reads as “more MIDI” -->
    <path d="M 68 58 L 88 55 L 88 59 L 68 62 Z" fill="url(#beamGrad)" opacity="0.72"/>
    <line x1="73" y1="60" x2="73" y2="69" stroke="#f8fafc" stroke-width="2.4" stroke-linecap="round" opacity="0.92"/>
    <line x1="82" y1="58.5" x2="82" y2="67.5" stroke="#f8fafc" stroke-width="2.4" stroke-linecap="round" opacity="0.92"/>
    <ellipse cx="73" cy="72.5" rx="5.5" ry="4.2" transform="rotate(-24 73 72.5)" fill="url(#headL)" opacity="0.92"/>
    <ellipse cx="82" cy="71.5" rx="5.5" ry="4.2" transform="rotate(-24 82 71.5)" fill="url(#headR)" opacity="0.92"/>
  </g>

  <circle cx="76" cy="20" r="2.2" fill="#fef08a"/>
  <circle cx="82" cy="26" r="1.2" fill="#e0f2fe" opacity="0.85"/>
</svg>
