<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="MiDiff enhancement pipeline">
  <defs>
    <linearGradient id="mdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <radialGradient id="mdGlow" cx="22%" cy="12%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#c084fc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mdBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="mdLetter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="flowUnder" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="48%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="procFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="mdDrop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.65"/>
    </filter>
    <filter id="pipeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="96" height="96" rx="22" fill="#020617"/>
  <rect width="96" height="96" rx="22" fill="url(#mdBg)"/>
  <rect width="96" height="96" rx="22" fill="url(#mdGlow)"/>

  <path d="M18 18c14-5 46-5 60 0 3 1 4 4 1 6l-.8 1.2c-18-6-42-6-54.8 0-2.2-1.8-1.8-4.8 1.4-6z" fill="#ffffff" opacity="0.11"/>

  <rect x="3" y="3" width="90" height="90" rx="19" fill="none" stroke="url(#mdBorder)" stroke-width="2" opacity="0.9"/>

  <g filter="url(#mdDrop)">
    <text
      x="48" y="27"
      text-anchor="middle"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-weight="800"
      font-size="17"
      letter-spacing="-0.02em"
      fill="url(#mdLetter)">MiDiff</text>
  </g>

  <!-- Pipeline lane -->
  <rect x="8" y="52" width="80" height="34" rx="10" fill="url(#flowUnder)"/>

  <g filter="url(#pipeGlow)">
    <!-- 1. Noisy drum audio (high-variance waveform) -->
    <path
      d="M 10 68 L 11.5 54 L 13 72 L 14.5 49 L 16 74 L 17.5 52 L 19 71 L 20.5 46 L 22 76 L 23.5 53 L 25 69 L 26.5 48 L 28 73 L 29.5 56 L 31 67"
      fill="none"
      stroke="#fb923c"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Arrow -->
    <path d="M 34 62 L 40 62 L 37 58 M 40 62 L 37 66" fill="none" stroke="url(#arrowGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 2. Conditioning + diffusion enhancement stack -->
    <rect x="42" y="47" width="30" height="32" rx="8" fill="url(#procFill)"/>
    <rect x="43.5" y="48.5" width="27" height="29" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>

    <!-- MIDI conditioning embedding strip (bars, not notation) -->
    <rect x="46" y="51.5" width="22" height="6" rx="2" fill="#22d3ee" opacity="0.45"/>
    <rect x="48.5" y="53.5" width="3.5" height="2.2" rx="0.5" fill="#f8fafc" opacity="0.9"/>
    <rect x="53.5" y="53.5" width="5" height="2.2" rx="0.5" fill="#f8fafc" opacity="0.85"/>
    <rect x="60.5" y="53.5" width="2.8" height="2.2" rx="0.5" fill="#f8fafc" opacity="0.75"/>

    <!-- Encoder / U-Net stages -->
    <rect x="47" y="60.5" width="20" height="2.8" rx="1.2" fill="#ffffff" opacity="0.9"/>
    <rect x="47" y="65" width="20" height="2.8" rx="1.2" fill="#ffffff" opacity="0.65"/>
    <rect x="47" y="69.5" width="20" height="2.8" rx="1.2" fill="#ffffff" opacity="0.42"/>

    <!-- Reverse diffusion steps -->
    <circle cx="51" cy="76.5" r="2" fill="#fde047"/>
    <circle cx="57" cy="76.5" r="2" fill="#fbbf24"/>
    <circle cx="63" cy="76.5" r="2" fill="#f59e0b"/>

    <!-- Arrow -->
    <path d="M 74 62 L 80 62 L 77 58 M 80 62 L 77 66" fill="none" stroke="url(#arrowGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 3. Enhanced output (smooth envelope) -->
    <path
      d="M 82 68 C 84 66 86 60 88 58 C 90 56 92 58 93.5 61 C 94.8 63.5 95.2 66 95 68"
      fill="none"
      stroke="#34d399"
      stroke-width="2.8"
      stroke-linecap="round"/>
  </g>

  <circle cx="76" cy="19" r="2.2" fill="#fef08a"/>
  <circle cx="82" cy="25" r="1.2" fill="#e0f2fe" opacity="0.85"/>
</svg>
