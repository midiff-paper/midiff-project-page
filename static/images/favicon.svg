<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="MiDiff">
  <defs>
    <linearGradient id="mdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <radialGradient id="mdGlow" cx="22%" cy="12%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mdBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="mdLetter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="noteGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="noteGradR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="mdDrop" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.65"/>
    </filter>
    <filter id="noteGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#22d3ee" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="96" height="96" rx="22" fill="#020617"/>
  <rect width="96" height="96" rx="22" fill="url(#mdBg)"/>
  <rect width="96" height="96" rx="22" fill="url(#mdGlow)"/>

  <!-- Sheen -->
  <path d="M18 18c14-5 46-5 60 0 3 1 4 4 1 6l-.8 1.2c-18-6-42-6-54.8 0-2.2-1.8-1.8-4.8 1.4-6z" fill="#ffffff" opacity="0.12"/>

  <!-- Neon frame -->
  <rect x="3" y="3" width="90" height="90" rx="19" fill="none" stroke="url(#mdBorder)" stroke-width="2" opacity="0.9"/>

  <!-- Wordmark -->
  <g filter="url(#mdDrop)">
    <text
      x="48" y="46"
      text-anchor="middle"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-weight="800"
      font-size="22"
      letter-spacing="-0.03em"
      fill="url(#mdLetter)">MiDiff</text>
  </g>

  <!-- Staff hint (subtle) -->
  <g opacity="0.22" stroke="#94a3b8" stroke-width="0.9">
    <line x1="18" y1="58" x2="78" y2="58"/>
    <line x1="18" y1="62" x2="78" y2="62"/>
    <line x1="18" y1="66" x2="78" y2="66"/>
  </g>

  <!-- Beamed eighth notes -->
  <g filter="url(#noteGlow)">
    <!-- beam -->
    <path d="M 36 52 L 60 48" stroke="url(#noteGradL)" stroke-width="3.2" stroke-linecap="round"/>
    <!-- stems -->
    <line x1="40" y1="53" x2="40" y2="74" stroke="#a5f3fc" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="56" y1="50" x2="56" y2="72" stroke="#f5d0fe" stroke-width="2.4" stroke-linecap="round"/>
    <!-- heads (filled ellipses, slight tilt like notation) -->
    <ellipse cx="40" cy="78" rx="6.5" ry="5" transform="rotate(-22 40 78)" fill="url(#noteGradL)"/>
    <ellipse cx="56" cy="76" rx="6.5" ry="5" transform="rotate(-22 56 76)" fill="url(#noteGradR)"/>
  </g>

  <!-- Spark -->
  <circle cx="76" cy="22" r="2.2" fill="#fef08a"/>
  <circle cx="82" cy="28" r="1.2" fill="#e0f2fe" opacity="0.85"/>
</svg>
