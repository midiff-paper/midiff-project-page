<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="MiDiff: noisy input, MIDI conditioning, spectrogram, enhanced waveform">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lgRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="midiBars" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="heatBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="waveOut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="noisyIn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#lgBg)"/>
  <path d="M22 18c18-6 66-6 84 0 4 1 5 5 2 8l-1 1.2c-25-8-58-8-76.2 0-2.8-2-2.4-6 3-6z" fill="#ffffff" opacity="0.07"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="none" stroke="url(#lgRim)" stroke-width="2.5" opacity="0.95"/>

  <!-- 1. Noisy drum audio -->
  <path
    d="M 18 26 L 20 18 L 22 28 L 24 14 L 26 30 L 28 16 L 30 26 L 32 20 L 34 28"
    fill="none"
    stroke="url(#noisyIn)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- 2. MIDI conditioning (symbolic piano-roll embeddings) -->
  <g transform="translate(38, 34)">
    <rect x="0" y="14" width="7" height="14" rx="2" fill="url(#midiBars)"/>
    <rect x="11" y="6" width="7" height="22" rx="2" fill="url(#midiBars)" opacity="0.95"/>
    <rect x="22" y="10" width="7" height="18" rx="2" fill="url(#midiBars)" opacity="0.88"/>
    <rect x="33" y="0" width="7" height="28" rx="2" fill="url(#midiBars)"/>
    <rect x="44" y="8" width="7" height="20" rx="2" fill="url(#midiBars)" opacity="0.92"/>
    <rect x="55" y="16" width="7" height="12" rx="2" fill="url(#midiBars)" opacity="0.85"/>
  </g>

  <!-- 3. Spectrogram / denoising bands -->
  <rect x="18" y="72" width="92" height="7" rx="3.5" fill="url(#heatBand)" opacity="0.52"/>
  <rect x="22" y="83" width="84" height="7" rx="3.5" fill="url(#heatBand)" opacity="0.36"/>
  <rect x="26" y="94" width="76" height="7" rx="3.5" fill="url(#heatBand)" opacity="0.24"/>

  <!-- 4. Enhanced waveform output -->
  <path
    d="M 16 112 C 30 112 42 100 56 96 C 70 92 84 98 96 102 C 102 104 108 108 112 112"
    fill="none"
    stroke="url(#waveOut)"
    stroke-width="4.5"
    stroke-linecap="round"/>
</svg>
