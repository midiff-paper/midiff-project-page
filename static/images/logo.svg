<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="MiDiff: three MIDI conditioning paths merge into enhanced drum audio">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="cardRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Three complementary conditioning strategies (paper: early inject, FiLM, cross-attn) -->
    <linearGradient id="ribbonA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="ribbonC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="fusedOut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <radialGradient id="fuseCore" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#67e8f9" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#cardBg)"/>
  <path d="M22 18c22-6 62-6 84 0 4 1 6 6 2 9l-1 1.3c-27-9-56-9-76 0-3-2.5-2.5-7 4-7.5z" fill="#ffffff" opacity="0.055"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="none" stroke="url(#cardRim)" stroke-width="2" opacity="0.88"/>

  <!-- Noisy drum signal (muted background context) -->
  <path
    d="M 14 92 Q 22 68 30 88 T 46 76 T 62 90"
    fill="none"
    stroke="#f97316"
    stroke-width="2"
    stroke-opacity="0.35"
    stroke-linecap="round"/>

  <!-- Three conditioning streams → fusion -->
  <g filter="url(#softShadow)">
    <path
      d="M 18 36 C 32 36 38 44 48 50 C 54 54 56 56 58 58"
      fill="none"
      stroke="url(#ribbonA)"
      stroke-width="4.5"
      stroke-linecap="round"/>
    <path
      d="M 18 58 C 34 58 40 56 48 54 C 54 52 56 56 58 58"
      fill="none"
      stroke="url(#ribbonB)"
      stroke-width="4.5"
      stroke-linecap="round"/>
    <path
      d="M 18 80 C 36 76 42 68 50 62 C 54 60 56 58 58 58"
      fill="none"
      stroke="url(#ribbonC)"
      stroke-width="4.5"
      stroke-linecap="round"/>

    <!-- Fusion core (single architecture combining all three) -->
    <circle cx="58" cy="58" r="14" fill="url(#fuseCore)" opacity="0.95"/>
    <circle cx="58" cy="58" r="14" fill="none" stroke="#e2e8f0" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="58" cy="58" r="9" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

    <!-- Enhanced output waveform -->
    <path
      d="M 72 58 C 82 56 88 52 94 54 C 102 56 106 62 114 58"
      fill="none"
      stroke="url(#fusedOut)"
      stroke-width="6"
      stroke-linecap="round"/>
    <path
      d="M 72 58 C 82 56 88 52 94 54 C 102 56 106 62 114 58"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.25"
      stroke-width="2"
      stroke-linecap="round"
      transform="translate(0,-1.5)"/>
  </g>

</svg>
