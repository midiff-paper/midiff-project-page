<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="MiDiff: reverse diffusion denoising, MIDI-conditioned audio enhancement">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lgRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- Remaining noise σ(t): falls during reverse diffusion (t: T→0) -->
    <linearGradient id="sigmaCurve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Trajectory color: corrupted → conditioned → restored -->
    <linearGradient id="pathDenoise" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="35%" stop-color="#c084fc"/>
      <stop offset="68%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="midiBars" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#lgBg)"/>
  <path d="M22 18c18-6 66-6 84 0 4 1 5 5 2 8l-1 1.2c-25-8-58-8-76.2 0-2.8-2-2.4-6 3-6z" fill="#ffffff" opacity="0.06"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="none" stroke="url(#lgRim)" stroke-width="2.5" opacity="0.95"/>

  <!-- Reverse diffusion: variance schedule — high residual noise left, suppressed right -->
  <path
    d="M 24 28 C 44 38 56 38 74 40 S 104 43 114 43"
    fill="none"
    stroke="url(#sigmaCurve)"
    stroke-width="2.4"
    stroke-linecap="round"/>
  <path
    d="M 24 28 C 44 38 56 38 74 40 S 104 43 114 43 L 114 46 L 24 46 Z"
    fill="url(#sigmaCurve)"
    opacity="0.14"/>

  <!-- Conditioning y (MIDI embeddings inform the score / enhancement) -->
  <g transform="translate(82, 12)" opacity="0.95">
    <rect x="0" y="6" width="5" height="14" rx="1.5" fill="url(#midiBars)"/>
    <rect x="8" y="0" width="5" height="20" rx="1.5" fill="url(#midiBars)"/>
    <rect x="16" y="10" width="5" height="10" rx="1.5" fill="url(#midiBars)" opacity="0.9"/>
    <rect x="24" y="4" width="5" height="16" rx="1.5" fill="url(#midiBars)" opacity="0.85"/>
  </g>

    <!-- Gaussian noise ε: strongest where σ is large (left), attenuates as denoising proceeds -->
  <g fill="#cbd5e1">
    <circle cx="22" cy="62" r="2.5" opacity="0.92"/>
    <circle cx="30" cy="56" r="2.2" opacity="0.85"/>
    <circle cx="26" cy="68" r="2" opacity="0.8"/>
    <circle cx="36" cy="60" r="2.4" opacity="0.78"/>
    <circle cx="34" cy="72" r="1.8" opacity="0.72"/>
    <circle cx="44" cy="58" r="2.1" opacity="0.58"/>
    <circle cx="42" cy="68" r="1.9" opacity="0.52"/>
    <circle cx="52" cy="64" r="1.7" opacity="0.38"/>
    <circle cx="50" cy="54" r="1.6" opacity="0.35"/>
    <circle cx="58" cy="62" r="1.4" opacity="0.22"/>
    <circle cx="54" cy="72" r="1.2" opacity="0.14"/>
  </g>

  <!-- Learned reverse step: drum latent goes from corrupted → denoised → enhanced -->
  <path
    d="M 18 100 L 21 84 L 24 102 L 27 78 L 30 104 L 33 82 L 36 98 L 39 88 L 42 100 L 45 90 L 48 96
       C 56 94 66 88 74 84 C 84 80 94 82 104 86 C 110 89 114 93 116 98"
    fill="none"
    stroke="url(#pathDenoise)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Sampler steps along the trajectory (discrete reverse diffusion updates) -->
  <g stroke="#64748b" stroke-width="1.4" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="102" x2="50" y2="108"/>
    <line x1="62" y1="100" x2="62" y2="108"/>
    <line x1="74" y1="97" x2="74" y2="108"/>
    <line x1="86" y1="96" x2="86" y2="108"/>
    <line x1="98" y1="97" x2="98" y2="108"/>
  </g>

  <!-- Direction of enhancement -->
  <g fill="#e2e8f0" opacity="0.75">
    <path d="M 102 28 l5 4 l-5 4 l-1.2-2.8 h-5.8 v-2.4 h5.8 z"/>
  </g>
</svg>
