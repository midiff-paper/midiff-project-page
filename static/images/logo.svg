<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="MiDiff: reverse diffusion denoising, MIDI-conditioned audio enhancement">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="55%" stop-color="#151e35"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <radialGradient id="lgVignette" cx="50%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lgRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="sigmaStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="48%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="sigmaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pathDenoise" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="32%" stop-color="#f0abfc"/>
      <stop offset="62%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="midiBars" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="midiPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="pathGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.55"/>
    </filter>
    <filter id="sigmaGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#a855f7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#lgBg)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#lgVignette)"/>
  <path d="M20 17c19-5 69-5 88 0 4 1 6 5 2 9l-1 1.2c-26-8-60-8-79 0-3-2-2.5-6 3.5-6.5z" fill="#ffffff" opacity="0.07"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="none" stroke="url(#lgRim)" stroke-width="2" opacity="0.92"/>
  <rect x="7" y="7" width="114" height="114" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- σ(t): smoother schedule -->
  <g filter="url(#sigmaGlow)">
    <path
      d="M 22 30 C 38 42 52 44 68 44 C 88 44 100 46 112 46"
      fill="none"
      stroke="url(#sigmaStroke)"
      stroke-width="2.75"
      stroke-linecap="round"/>
    <path
      d="M 22 30 C 38 42 52 44 68 44 C 88 44 100 46 112 46 L 112 49 L 22 49 Z"
      fill="url(#sigmaFill)"/>
  </g>

  <!-- MIDI conditioning chip -->
  <g transform="translate(76, 11)">
    <rect x="0" y="0" width="38" height="26" rx="8" fill="url(#midiPanel)" stroke="#334155" stroke-width="1" opacity="0.95"/>
    <rect x="6" y="14" width="5" height="10" rx="1.5" fill="url(#midiBars)"/>
    <rect x="14" y="8" width="5" height="16" rx="1.5" fill="url(#midiBars)" opacity="0.98"/>
    <rect x="22" y="12" width="5" height="12" rx="1.5" fill="url(#midiBars)" opacity="0.92"/>
    <rect x="30" y="10" width="5" height="14" rx="1.5" fill="url(#midiBars)" opacity="0.88"/>
    <!-- highlight -->
    <line x1="7" y1="9" x2="34" y2="9" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Noise ε: layered specks -->
  <g opacity="0.92">
    <g fill="#e2e8f0">
      <circle cx="24" cy="58" r="2.2" opacity="0.72"/>
      <circle cx="31" cy="53" r="1.9" opacity="0.62"/>
      <circle cx="28" cy="64" r="1.7" opacity="0.58"/>
      <circle cx="37" cy="56" r="2" opacity="0.54"/>
      <circle cx="35" cy="66" r="1.5" opacity="0.48"/>
      <circle cx="44" cy="60" r="1.8" opacity="0.4"/>
      <circle cx="41" cy="52" r="1.4" opacity="0.36"/>
      <circle cx="50" cy="58" r="1.5" opacity="0.28"/>
      <circle cx="48" cy="68" r="1.2" opacity="0.22"/>
      <circle cx="56" cy="62" r="1.3" opacity="0.16"/>
    </g>
  </g>
  <g fill="#bae6fd" opacity="0.35">
    <circle cx="26" cy="56" r="1"/>
    <circle cx="33" cy="62" r="0.85"/>
    <circle cx="40" cy="54" r="0.9"/>
    <circle cx="46" cy="60" r="0.75"/>
  </g>

  <!-- Denoising path: glow underlay + main stroke -->
  <g filter="url(#pathGlow)">
    <path
      d="M 20 98 L 23 82 L 26 100 L 29 76 L 32 102 L 35 80 L 38 96 L 41 86 L 44 98 L 47 88 L 50 94
         C 58 92 68 86 76 82 C 88 77 98 79 106 83 C 110 85 113 89 114 94"
      fill="none"
      stroke="#0f172a"
      stroke-width="6.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.35"/>
    <path
      d="M 20 98 L 23 82 L 26 100 L 29 76 L 32 102 L 35 80 L 38 96 L 41 86 L 44 98 L 47 88 L 50 94
         C 58 92 68 86 76 82 C 88 77 98 79 106 83 C 110 85 113 89 114 94"
      fill="none"
      stroke="url(#pathDenoise)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Step markers: refined -->
  <g opacity="0.65">
    <line x1="52" y1="100" x2="52" y2="106" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="64" y1="98" x2="64" y2="106" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="76" y1="96" x2="76" y2="106" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="88" y1="95" x2="88" y2="106" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="100" y1="96" x2="100" y2="106" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <line x1="48" y1="106" x2="104" y2="106" stroke="#334155" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Flow arrow -->
  <g transform="translate(100, 26)" opacity="0.88">
    <path d="M 0 0 L 8 0 L 5.5 -3.2 M 8 0 L 5.5 3.2" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
